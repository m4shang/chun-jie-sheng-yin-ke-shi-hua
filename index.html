<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>春节声音可视化设计</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f0a06;
    color: #f0e6d0;
    font-family: "Noto Serif SC", "Source Han Serif SC", "STSong", serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .grain {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    padding: 0 0 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .hero {
    width: 100%;
    padding: 48px 24px 32px;
    text-align: center;
    border-bottom: 1px solid rgba(210,140,60,0.2);
  }

  .label {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: #b8762a;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  h1 {
    font-size: 28px;
    font-weight: 400;
    line-height: 1.4;
    color: #f5e0b8;
    letter-spacing: 0.08em;
    margin-bottom: 16px;
  }

  .deco-line {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
    margin-bottom: 14px;
  }

  .deco-line span {
    display: block;
    height: 1px;
    width: 40px;
    background: linear-gradient(to right, transparent, #b8762a);
  }

  .deco-line span:last-child {
    background: linear-gradient(to left, transparent, #b8762a);
  }

  .deco-line i {
    font-size: 14px;
    color: #b8762a;
  }

  .author {
    font-size: 14px;
    color: #9a8060;
    letter-spacing: 0.15em;
  }

  .video-section {
    width: 100%;
    padding: 28px 20px 0;
  }

  .video-wrap {
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    background: #1a100a;
    border: 1px solid rgba(184,118,42,0.2);
    position: relative;
    aspect-ratio: 16/9;
  }

  .video-wrap iframe,
  .video-wrap video {
    width: 100%;
    height: 100%;
    display: block;
    border: none;
  }

  .loading {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #9a8060;
    font-size: 14px;
    letter-spacing: 0.1em;
  }

  .error {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #9a8060;
    font-size: 13px;
    padding: 20px;
  }

  .footer {
    margin-top: 36px;
    text-align: center;
    padding: 0 24px;
  }

  .footer p {
    font-size: 11px;
    color: #5a4530;
    letter-spacing: 0.12em;
    line-height: 1.8;
  }

  .seal {
    width: 56px;
    height: 56px;
    margin: 28px auto 0;
    border: 1.5px solid rgba(184,118,42,0.4);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #b8762a;
    font-size: 18px;
    opacity: 0.6;
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
<div class="grain"></div>
<div class="wrap">
  <div class="hero">
    <p class="label">毕业设计作品</p>
    <h1 id="main-title">春节声音可视化设计</h1>
    <div class="deco-line">
      <span></span>
      <i>❋</i>
      <span></span>
    </div>
    <p class="author" id="main-author">作者：马上</p>
  </div>

  <div class="video-section">
    <div class="video-wrap" id="video-wrap">
      <div class="loading" id="loading">载入中...</div>
    </div>
  </div>

  <div class="footer">
    <p id="footer-text">春节声音可视化设计 · 视觉传达设计</p>
    <div class="seal">马</div>
  </div>
</div>

<script>
async function loadVideo() {
  try {
    const res = await fetch('./video.json?t=' + Date.now());
    const cfg = await res.json();
    const wrap = document.getElementById('video-wrap');
    const loading = document.getElementById('loading');

    if (cfg.title) document.getElementById('main-title').textContent = cfg.title;
    if (cfg.author) document.getElementById('main-author').textContent = '作者：' + cfg.author;
    document.title = cfg.title || '春节声音可视化设计';

    loading.remove();

    if (cfg.videoType === 'bilibili' && cfg.bvid) {
      const iframe = document.createElement('iframe');
      iframe.src = `https://player.bilibili.com/player.html?bvid=${cfg.bvid}&page=1&high_quality=1&danmaku=0`;
      iframe.allowFullscreen = true;
      iframe.setAttribute('allow', 'fullscreen');
      iframe.scrolling = 'no';
      wrap.appendChild(iframe);

    } else if (cfg.videoType === 'youtube' && cfg.ytid) {
      const iframe = document.createElement('iframe');
      iframe.src = `https://www.youtube.com/embed/${cfg.ytid}`;
      iframe.allowFullscreen = true;
      iframe.setAttribute('allow', 'accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture');
      wrap.appendChild(iframe);

    } else if (cfg.videoType === 'douyin' && cfg.dyid) {
      const iframe = document.createElement('iframe');
      iframe.src = `https://open.douyin.com/player/video?vid=${cfg.dyid}&autoplay=0`;
      iframe.allowFullscreen = true;
      iframe.setAttribute('allow', 'fullscreen');
      wrap.appendChild(iframe);
     
    } else if (cfg.videoType === 'mp4' && cfg.url) {
      const video = document.createElement('video');
      video.src = cfg.url;
      video.controls = true;
      video.playsInline = true;
      video.setAttribute('webkit-playsinline', '');
      wrap.appendChild(video);

    } else {
      wrap.innerHTML = '<div class="error">暂无视频内容</div>';
    }
  } catch(e) {
    document.getElementById('video-wrap').innerHTML = '<div class="error">视频加载失败，请检查配置</div>';
  }
}

loadVideo();
</script>
</body>
</html>
